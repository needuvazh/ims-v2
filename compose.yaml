services:
  postgres:
    image: postgres:16-alpine
    container_name: ims-v2-postgres
    restart: unless-stopped
    ports:
      - '5435:5432'
    environment:
      POSTGRES_DB: ims_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ims_v2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d ims_dev' ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  ims_v2_postgres_data: 
